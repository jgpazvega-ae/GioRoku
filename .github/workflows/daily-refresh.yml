name: Nightly Pipeline

on:
  schedule:
    - cron: "0 0 * * *"   # 00:00 UTC every day
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    name: Fetch channels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: backend/db/iptv.db
          key: iptv-db-${{ github.run_id }}
          restore-keys: iptv-db-

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Stage — fetch
        run: python backend/run_pipeline.py --stage fetch

      - name: Save DB artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-db-fetch
          path: backend/db/iptv.db
          retention-days: 1

  validate:
    name: Validate streams
    needs: fetch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download DB
        uses: actions/download-artifact@v4
        with:
          name: iptv-db-fetch
          path: backend/db/

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Stage — validate
        run: python backend/run_pipeline.py --stage validate

      - name: Save DB artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-db-validate
          path: backend/db/iptv.db
          retention-days: 1

  process:
    name: Deduplicate, classify, enrich
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download DB
        uses: actions/download-artifact@v4
        with:
          name: iptv-db-validate
          path: backend/db/

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Stage — deduplicate, classify, enrich
        run: python backend/run_pipeline.py --stage deduplicate,classify,enrich

      - name: Save DB artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-db-process
          path: backend/db/iptv.db
          retention-days: 1

  generate:
    name: Generate JSON API
    needs: process
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download DB
        uses: actions/download-artifact@v4
        with:
          name: iptv-db-process
          path: backend/db/

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Stage — generate
        run: python backend/run_pipeline.py --stage generate

      - name: Commit and push API files
        run: |
          git config user.name "GioRoku Bot"
          git config user.email "bot@gioroku.local"
          git add docs/api/ roku-app/data/channels.json
          git diff --staged --quiet || git commit -m "chore: api update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Channel status summary
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, sqlite3, sys
          from pathlib import Path

          db = Path("backend/db/iptv.db")
          if not db.exists():
              sys.exit(0)

          with sqlite3.connect(db) as conn:
              conn.row_factory = sqlite3.Row
              rows = conn.execute("""
                  SELECT name, country, category, is_online, response_ms, offline_count
                  FROM channels WHERE is_enabled=1
                  ORDER BY is_online DESC, response_ms ASC NULLS LAST, name
              """).fetchall()

          total  = len(rows)
          online = sum(1 for r in rows if r["is_online"])
          pct    = round(online / total * 100) if total else 0

          SUMMARY = Path(
              __import__("os").environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          )
          lines = [
              "## 📡 GioRoku — Pipeline nocturno\n",
              f"| | |", f"|---|---|",
              f"| **Total** | {total} |",
              f"| **✅ En línea** | {online} |",
              f"| **❌ Fuera de línea** | {total-online} |",
              f"| **Disponibilidad** | **{pct}%** |", "",
          ]
          on_rows = [r for r in rows if r["is_online"]]
          if on_rows:
              lines += [f"### ✅ Funcionales ({len(on_rows)})\n",
                        "| Canal | País | ms |", "|---|---|---|"]
              lines += [f"| {r['name']} | {r['country'] or '—'} | {r['response_ms'] or '—'} |"
                        for r in on_rows]
              lines.append("")
          off_rows = [r for r in rows if not r["is_online"]]
          if off_rows:
              lines += [f"<details><summary>❌ Fuera de línea ({len(off_rows)})</summary>\n",
                        "| Canal | País | Fallos |", "|---|---|---|"]
              lines += [f"| {r['name']} | {r['country'] or '—'} | {r['offline_count'] or 0} |"
                        for r in off_rows]
              lines += ["</details>", ""]
          lines.append("> [Ver estado en vivo](https://jgpazvega-ae.github.io/GioRoku/status.html)")
          SUMMARY.write_text("\n".join(lines), encoding="utf-8")
          print(f"Summary written: {online}/{total} ({pct}%)")
          PYEOF
