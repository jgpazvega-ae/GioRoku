name: Build & Deploy Admin Portal

on:
  push:
    branches: [main]
    paths:
      - "admin/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and commit admin portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: Build
        working-directory: admin
        run: npm run build
        env:
          VITE_API_BASE: "https://${{ github.repository_owner }}.github.io/GioRoku/api/v1"
          VITE_GITHUB_OWNER: "${{ github.repository_owner }}"
          VITE_GITHUB_REPO: "GioRoku"
          VITE_GITHUB_BRANCH: "main"

      - name: Commit built portal to docs/admin
        run: |
          git config user.name "GioRoku Bot"
          git config user.email "bot@gioroku.local"
          git add docs/admin/
          git diff --staged --quiet || git commit -m "build: update admin portal $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
