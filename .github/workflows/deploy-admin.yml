name: Deploy Admin Portal

on:
  push:
    branches: [main]
    paths:
      - "admin/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build admin portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: admin
        run: npm install

      - name: Build
        working-directory: admin
        run: npm run build
        env:
          VITE_API_BASE: "https://${{ github.repository_owner }}.github.io/GioRoku/api/v1"
          VITE_GITHUB_OWNER: "${{ github.repository_owner }}"
          VITE_GITHUB_REPO: "GioRoku"
          VITE_GITHUB_BRANCH: "main"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/admin

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
